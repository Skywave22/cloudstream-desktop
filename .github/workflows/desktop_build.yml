name: Build Desktop EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Windows EXE
        run: ./gradlew.bat :desktop:packageExe

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: CloudStreamDesktop-Windows
          path: desktop/build/compose/binaries/main/exe/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Linux DEB
        run: ./gradlew :desktop:packageDeb

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: CloudStreamDesktop-Linux
          path: desktop/build/compose/binaries/main/deb/*.deb

      - name: Build Linux App-Image
        run: ./gradlew :desktop:createDistributable

      - name: Upload Linux App-Image
        uses: actions/upload-artifact@v4
        with:
          name: CloudStreamDesktop-Linux-Portable
          path: desktop/build/compose/binaries/main/app/CloudStreamDesktop/**/**
